services:
  postgres:
    image: postgres:18
    container_name: multiagent-postgres
    environment:
      POSTGRES_DB: dvdrental
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/restore-dvdrental.sh:/docker-entrypoint-initdb.d/10-restore-dvdrental.sh:ro
      - ./db/dvdrental.tar:/docker-entrypoint-initdb.d/dvdrental.tar:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d dvdrental" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-server:
    build: .
    container_name: multiagent-mcp-server
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: dvdrental
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
